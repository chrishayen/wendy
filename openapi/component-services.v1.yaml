components:
  securitySchemes:
    componentBearer:
      type: http
      scheme: bearer
      description: Optional transport guard used by component services when configured.
    nodeBearer:
      type: http
      scheme: bearer
      description: Node-local bearer credential configured in the node config file.
    runnerMonitorBearer:
      type: http
      scheme: bearer
      description: Optional bearer credential configured with pacp-runner -monitor-token.
  parameters:
    ActorSubjectID:
      name: X-Actor-Subject-ID
      in: header
      required: false
      schema:
        type: string
    ArtifactID:
      name: artifact_id
      in: path
      required: true
      schema:
        type: string
    CapabilityID:
      name: capability_id
      in: path
      required: true
      schema:
        type: string
    ProviderContentRef:
      name: content_ref
      in: path
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    IdempotencyKeyRequired:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    KeyID:
      name: key_id
      in: path
      required: true
      schema:
        type: string
    LeaseID:
      name: lease_id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    RequestID:
      name: request_id
      in: path
      required: true
      schema:
        type: string
    RequesterID:
      name: requester_id
      in: query
      required: true
      schema:
        type: string
    ResourceID:
      name: resource_id
      in: path
      required: true
      schema:
        type: string
    ServiceID:
      name: service_id
      in: path
      required: true
      schema:
        type: string
    UploadID:
      name: upload_id
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Health:
      description: Component health envelope.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ComponentHealth"
    Metrics:
      description: Component metrics envelope.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ComponentMetrics"
    CatalogExportResponse:
