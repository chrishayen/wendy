openapi: 3.1.0
info:
  title: PACP Component Services API
  version: v1
  description: Internal distributed HTTP contracts between PACP components, runners, nodes, and operators.
servers:
  - url: "{catalog_url}"
    description: Configured catalog service base URL.
    variables:
      catalog_url:
        default: https://catalog.pacp.example
        description: Replace with the deployed catalog URL, or a local development URL.
  - url: "{jobs_url}"
    description: Configured jobs service base URL.
    variables:
      jobs_url:
        default: https://jobs.pacp.example
        description: Replace with the deployed jobs URL, or a local development URL.
  - url: "{leases_url}"
    description: Configured leases service base URL.
    variables:
      leases_url:
        default: https://leases.pacp.example
        description: Replace with the deployed leases URL, or a local development URL.
  - url: "{artifacts_url}"
    description: Configured artifacts service base URL.
    variables:
      artifacts_url:
        default: https://artifacts.pacp.example
        description: Replace with the deployed artifacts URL, or a local development URL.
  - url: "{policy_url}"
    description: Configured policy service base URL.
    variables:
      policy_url:
        default: https://policy.pacp.example
        description: Replace with the deployed policy URL, or a local development URL.
  - url: "{node_url}"
    description: Configured node service base URL.
    variables:
      node_url:
        default: https://node.pacp.example
        description: Replace with the deployed node URL, or a local development URL.
  - url: "{provider_url}"
    description: Configured provider service base URL.
    variables:
      provider_url:
        default: https://provider.pacp.example
        description: Replace with the deployed provider URL, or a local development URL.
  - url: "{runner_url}"
    description: Configured runner monitor service base URL.
    variables:
      runner_url:
        default: https://runner.pacp.example
        description: Replace with the deployed runner monitor URL, or a local development URL.
security:
  - componentBearer: []
tags:
  - name: catalog
  - name: jobs
  - name: leases
  - name: artifacts
  - name: policy
  - name: node
  - name: provider
  - name: runner
paths:
  /v1/catalog/health:
    get:
      tags: [catalog]
      operationId: getCatalogHealth
      x-operation-audience: monitor
      x-policy-action: catalog.health.read
      responses:
        "200":
          $ref: "#/components/responses/Health"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/metrics:
    get:
      tags: [catalog]
      operationId: getCatalogMetrics
      x-operation-audience: monitor
      x-policy-action: catalog.metrics.read
      responses:
        "200":
          $ref: "#/components/responses/Metrics"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/manifests:
    post:
      tags: [catalog]
      operationId: registerProviderManifest
      x-operation-audience: component
      x-policy-action: catalog.register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderManifest"
      responses:
        "201":
          $ref: "#/components/responses/CatalogRegistrationResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/export:
    get:
      tags: [catalog]
      operationId: exportCatalog
      x-operation-audience: component
      x-policy-action: catalog.read
      responses:
        "200":
          $ref: "#/components/responses/CatalogExportResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/services:
    get:
      tags: [catalog]
      operationId: listCatalogServices
      x-operation-audience: component
      x-policy-action: catalog.read
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CatalogServiceListResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/services/{service_id}:
    get:
      tags: [catalog]
      operationId: getCatalogService
      x-operation-audience: component
      x-policy-action: catalog.read
      parameters:
        - $ref: "#/components/parameters/ServiceID"
      responses:
        "200":
          $ref: "#/components/responses/CatalogServiceResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/capabilities:
    get:
      tags: [catalog]
      operationId: listCatalogCapabilities
      x-operation-audience: component
      x-policy-action: catalog.read
      parameters:
        - name: capability_id
          in: query
          schema:
            type: string
        - name: service_id
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: execution_mode
          in: query
          schema:
            type: string
            enum: [sync, async, either]
        - name: resource_selector
          in: query
          schema:
            type: string
        - name: visible_capability_ids
          in: query
          schema:
            type: array
            items:
              type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CatalogCapabilityListResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/capabilities/{capability_id}:
    get:
      tags: [catalog]
      operationId: getCatalogCapability
      x-operation-audience: component
      x-policy-action: catalog.read
      parameters:
        - $ref: "#/components/parameters/CapabilityID"
      responses:
        "200":
          $ref: "#/components/responses/CatalogCapabilityResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/capabilities/{capability_id}/route:
    get:
      tags: [catalog]
      operationId: getCapabilityRoute
      x-operation-audience: component
      x-policy-action: catalog.route.read
      parameters:
        - $ref: "#/components/parameters/CapabilityID"
      responses:
        "200":
          $ref: "#/components/responses/CapabilityRouteResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/catalog/tags:
    get:
      tags: [catalog]
      operationId: listCatalogTags
      x-operation-audience: component
      x-policy-action: catalog.read
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CatalogTagListResponse"
        default:
          $ref: "#/components/responses/Error"

  /v1/jobs/health:
    get:
      tags: [jobs]
      operationId: getJobsHealth
      x-operation-audience: monitor
      x-policy-action: job.health.read
      responses:
        "200":
          $ref: "#/components/responses/Health"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/metrics:
    get:
      tags: [jobs]
      operationId: getJobsMetrics
      x-operation-audience: monitor
      x-policy-action: job.metrics.read
      responses:
        "200":
          $ref: "#/components/responses/Metrics"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs:
    get:
      tags: [jobs]
      operationId: listJobs
      x-operation-audience: [component, worker]
      x-policy-action: [job.read, job.execute]
      parameters:
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/JobState"
        - name: capability_id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/JobListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [jobs]
      operationId: createJob
      x-operation-audience: component
      x-policy-action: job.create
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "200":
          $ref: "#/components/responses/JobResponse"
        "201":
          $ref: "#/components/responses/JobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}:
    get:
      tags: [jobs]
      operationId: getJob
      x-operation-audience: [component, worker]
      x-policy-action: [job.read, job.execute]
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          $ref: "#/components/responses/JobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/policy-context:
    get:
      tags: [jobs]
      operationId: getJobPolicyContext
      x-operation-audience: component
      x-policy-action: job.read
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          $ref: "#/components/responses/JobPolicyContextResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/agent-projection:
    get:
      tags: [jobs]
      operationId: getJobAgentProjection
      x-operation-audience: component
      x-policy-action: job.read
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          $ref: "#/components/responses/AgentJobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/claim:
    post:
      tags: [jobs]
      operationId: claimJob
      x-operation-audience: worker
      x-policy-action: job.execute
      parameters:
        - $ref: "#/components/parameters/JobID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobClaimRequest"
      responses:
        "200":
          $ref: "#/components/responses/JobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/heartbeat:
    post:
      tags: [jobs]
      operationId: heartbeatJob
      x-operation-audience: worker
      x-policy-action: job.execute
      parameters:
        - $ref: "#/components/parameters/JobID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobHeartbeatRequest"
      responses:
        "200":
          $ref: "#/components/responses/JobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/complete:
    post:
      tags: [jobs]
      operationId: completeJob
      x-operation-audience: worker
      x-policy-action: job.execute
      parameters:
        - $ref: "#/components/parameters/JobID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCompleteRequest"
      responses:
        "200":
          $ref: "#/components/responses/JobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/fail:
    post:
      tags: [jobs]
      operationId: failJob
      x-operation-audience: worker
      x-policy-action: job.execute
      parameters:
        - $ref: "#/components/parameters/JobID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobFailRequest"
      responses:
        "200":
          $ref: "#/components/responses/JobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/cancel:
    post:
      tags: [jobs]
      operationId: cancelJob
      x-operation-audience: component
      x-policy-action: job.cancel
      parameters:
        - $ref: "#/components/parameters/JobID"
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRequest"
      responses:
        "200":
          $ref: "#/components/responses/JobResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/jobs/{job_id}/logs:
    get:
      tags: [jobs]
      operationId: getJobLogs
      x-operation-audience: [component, worker]
      x-policy-action: [job.read, job.execute]
      parameters:
        - $ref: "#/components/parameters/JobID"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/JobLogListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [jobs]
      operationId: appendJobLogs
      x-operation-audience: worker
      x-policy-action: job.execute
      parameters:
        - $ref: "#/components/parameters/JobID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendJobLogRequest"
      responses:
        "200":
          $ref: "#/components/responses/JobLogListResponse"
        default:
          $ref: "#/components/responses/Error"

  /v1/leases/health:
    get:
      tags: [leases]
      operationId: getLeasesHealth
      x-operation-audience: monitor
      x-policy-action: lease.health.read
      responses:
        "200":
          $ref: "#/components/responses/Health"
        default:
          $ref: "#/components/responses/Error"
  /v1/leases/metrics:
    get:
      tags: [leases]
      operationId: getLeasesMetrics
      x-operation-audience: monitor
      x-policy-action: lease.metrics.read
      responses:
        "200":
          $ref: "#/components/responses/Metrics"
        default:
          $ref: "#/components/responses/Error"
  /v1/resources:
    get:
      tags: [leases]
      operationId: listResources
      x-operation-audience: [component, worker]
      x-policy-action: lease.read
      parameters:
        - name: selector
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ResourceListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [leases]
      operationId: registerResource
      x-operation-audience: component
      x-policy-action: lease.resource.register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterResourceRequest"
      responses:
        "201":
          $ref: "#/components/responses/ResourceResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/resources/{resource_id}:
    get:
      tags: [leases]
      operationId: getResource
      x-operation-audience: [component, worker]
      x-policy-action: lease.read
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          $ref: "#/components/responses/ResourceResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/resources/{resource_id}/inspection:
    get:
      tags: [leases]
      operationId: inspectResource
      x-operation-audience: [component, worker]
      x-policy-action: lease.read
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          $ref: "#/components/responses/ResourceInspectionResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/lease-requests:
    get:
      tags: [leases]
      operationId: listLeaseRequestsByRequester
      x-operation-audience: [component, worker]
      x-policy-action: lease.read
      parameters:
        - $ref: "#/components/parameters/RequesterID"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/LeaseRequestListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [leases]
      operationId: createLeaseRequest
      x-operation-audience: worker
      x-policy-action: lease.request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaseRequest"
      responses:
        "201":
          $ref: "#/components/responses/LeaseRequestResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/lease-requests/{request_id}:
    get:
      tags: [leases]
      operationId: getLeaseRequest
      x-operation-audience: [component, worker]
      x-policy-action: lease.read
      parameters:
        - $ref: "#/components/parameters/RequestID"
      responses:
        "200":
          $ref: "#/components/responses/LeaseRequestResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/lease-requests/{request_id}/cancel:
    post:
      tags: [leases]
      operationId: cancelLeaseRequest
      x-operation-audience: [component, worker]
      x-policy-action: lease.cancel
      parameters:
        - $ref: "#/components/parameters/RequestID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRequest"
      responses:
        "200":
          $ref: "#/components/responses/LeaseRequestResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/leases/{lease_id}:
    get:
      tags: [leases]
      operationId: getLease
      x-operation-audience: [component, worker]
      x-policy-action: lease.read
      parameters:
        - $ref: "#/components/parameters/LeaseID"
      responses:
        "200":
          $ref: "#/components/responses/LeaseResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/leases/{lease_id}/heartbeat:
    post:
      tags: [leases]
      operationId: heartbeatLease
      x-operation-audience: worker
      x-policy-action: lease.heartbeat
      parameters:
        - $ref: "#/components/parameters/LeaseID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaseHeartbeatRequest"
      responses:
        "200":
          $ref: "#/components/responses/LeaseResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/leases/{lease_id}/release:
    post:
      tags: [leases]
      operationId: releaseLease
      x-operation-audience: worker
      x-policy-action: lease.release
      parameters:
        - $ref: "#/components/parameters/LeaseID"
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
        - $ref: "#/components/parameters/ActorSubjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaseReleaseRequest"
      responses:
        "200":
          $ref: "#/components/responses/LeaseResponse"
        default:
          $ref: "#/components/responses/Error"

  /v1/artifacts/health:
    get:
      tags: [artifacts]
      operationId: getArtifactsHealth
      x-operation-audience: monitor
      x-policy-action: artifact.health.read
      responses:
        "200":
          $ref: "#/components/responses/Health"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifacts/metrics:
    get:
      tags: [artifacts]
      operationId: getArtifactsMetrics
      x-operation-audience: monitor
      x-policy-action: artifact.metrics.read
      responses:
        "200":
          $ref: "#/components/responses/Metrics"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifact-uploads:
    post:
      tags: [artifacts]
      operationId: createArtifactUpload
      x-operation-audience: worker
      x-policy-action: artifact.register
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtifactUploadRequest"
      responses:
        "200":
          $ref: "#/components/responses/ArtifactUploadResponse"
        "201":
          $ref: "#/components/responses/ArtifactUploadResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifact-uploads/{upload_id}:
    get:
      tags: [artifacts]
      operationId: getArtifactUpload
      x-operation-audience: worker
      x-policy-action: artifact.register
      parameters:
        - $ref: "#/components/parameters/UploadID"
      responses:
        "200":
          $ref: "#/components/responses/ArtifactUploadResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifact-uploads/{upload_id}/content:
    put:
      tags: [artifacts]
      operationId: putArtifactUploadContent
      x-operation-audience: worker
      x-policy-action: artifact.register
      parameters:
        - $ref: "#/components/parameters/UploadID"
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
        - name: Content-Length
          in: header
          required: true
          schema:
            type: integer
            format: int64
        - name: Digest
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          "*/*":
            schema:
              type: string
              format: binary
      responses:
        "200":
          $ref: "#/components/responses/ArtifactUploadResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifact-uploads/{upload_id}/complete:
    post:
      tags: [artifacts]
      operationId: completeArtifactUpload
      x-operation-audience: worker
      x-policy-action: artifact.register
      parameters:
        - $ref: "#/components/parameters/UploadID"
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteArtifactUploadRequest"
      responses:
        "200":
          $ref: "#/components/responses/ArtifactResponse"
        "201":
          $ref: "#/components/responses/ArtifactResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifacts:
    get:
      tags: [artifacts]
      operationId: listArtifacts
      x-operation-audience: component
      x-policy-action: artifact.read
      parameters:
        - name: producer_ref
          in: query
          schema:
            type: string
        - name: owner_subject_id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ArtifactListResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifacts/retention/sweep:
    post:
      tags: [artifacts]
      operationId: sweepArtifactRetention
      x-operation-audience: component
      x-policy-action: artifact.retention.sweep
      responses:
        "200":
          $ref: "#/components/responses/ArtifactRetentionSweepResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifacts/register-local:
    post:
      tags: [artifacts]
      operationId: registerLocalArtifact
      x-operation-audience: worker
      x-policy-action: artifact.register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterLocalArtifactRequest"
      responses:
        "201":
          $ref: "#/components/responses/ArtifactResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifacts/{artifact_id}:
    get:
      tags: [artifacts]
      operationId: getArtifact
      x-operation-audience: component
      x-policy-action: artifact.read
      parameters:
        - $ref: "#/components/parameters/ArtifactID"
      responses:
        "200":
          $ref: "#/components/responses/ArtifactResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifacts/{artifact_id}/policy-context:
    get:
      tags: [artifacts]
      operationId: getArtifactPolicyContext
      x-operation-audience: component
      x-policy-action: artifact.read
      parameters:
        - $ref: "#/components/parameters/ArtifactID"
      responses:
        "200":
          $ref: "#/components/responses/ArtifactPolicyContextResponse"
        default:
          $ref: "#/components/responses/Error"
  /v1/artifacts/{artifact_id}/content:
    get:
